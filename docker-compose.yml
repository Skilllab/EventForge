services:
  # ===========================================================================
  # ZOOKEEPER
  # ===========================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: eventforge_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # KAFKA
  # ===========================================================================      
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: eventforge-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      # Внешний listener для подключения с хоста (например, из dotnet run локально).
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Два listener'а: INTERNAL — для сервисов внутри сети Docker, EXTERNAL — для хоста.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
  
  akhq:
    image: tchiotludo/akhq:0.25.0
    container_name: eventforge_akhq
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy
    
  # ===========================================================================
  # KAFKA INIT TOPICS
  # ===========================================================================
  kafka-init-topics:
    image: confluentinc/cp-kafka:7.6.1
    container_name: eventforge_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ '/bin/sh', '-c' ]
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPICS: >
        booking-confirmed
        booking-rejected
        booking-cancelled
        booking-not-approved
        booking-requested
    command: >
      "
      echo 'Creating Kafka topics...';
      for topic in $$KAFKA_TOPICS; do
        kafka-topics --bootstrap-server $$KAFKA_BOOTSTRAP_SERVER --create --if-not-exists --topic $$topic --partitions 1 --replication-factor 1;
      done;
      echo 'All topics checked/created successfully!';
      "
      
  # ===========================================================================
  # POSTGRESQL (ЕДИНЫЙ ЭКЗЕМПЛЯР ДЛЯ ВСЕХ БАЗ)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: eventforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${USERS_DB}
      EVENTS_DATABASE: ${EVENTS_DB}
      BOOKING_DATABASE: ${BOOKING_DB}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /docker-entrypoint-initdb.d
        echo "CREATE DATABASE \"$$EVENTS_DATABASE\";" > /docker-entrypoint-initdb.d/01-events.sql
        echo "CREATE DATABASE \"$$BOOKING_DATABASE\";" > /docker-entrypoint-initdb.d/02-booking.sql
        exec /usr/local/bin/docker-entrypoint.sh postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${USERS_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  # ===========================================================================
  # REDIS
  # ===========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: eventapi-redis
    environment:
      ConnectionStrings__Redis: ${EVENTS_REDIS_CONNECTION_STRING}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      
  # ===========================================================================
  # USERS DB
  # ===========================================================================
  users_api:
    build:
      context: .
      dockerfile: EventForge.Users/dockerfile
    container_name: eventforge_users_api
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: ${USERS_CONNECTION_STRING}
    ports:
      - "5008:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ===========================================================================
  # EVENTS DB
  # ===========================================================================
  events_api:
    build:
      context: .
      dockerfile: EventForge.Events/Dockerfile
    container_name: eventforge_events_api
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: ${EVENTS_CONNECTION_STRING}
      KafkaOptions__BootstrapServers: kafka:29092
      KafkaOptions__ConsumerGroup: eventforge-events
    ports:
      - "5009:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===========================================================================
  # BOOKING DB
  # ===========================================================================
  booking_api:
    build:
      context: .
      dockerfile: EventForge.Booking/Dockerfile
    container_name: eventforge_booking_api
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: ${BOOKING_CONNECTION_STRING}
      KafkaOptions__BootstrapServers: kafka:29092
    ports:
      - "5010:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ===========================================================================
  # PGADMIN
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: my_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_ALLOW_SAVE_PASSWORD: "True"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "8020:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpass:/var/lib/pgadmin/.pgpass
    depends_on:
      - postgres
      
volumes:
  postgres_data:
  pgadmin_data:
  redis_insight_data: