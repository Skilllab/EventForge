global:
  scrape_interval: 15s

scrape_configs:
  - job_name: eventforge_users_api
    static_configs:
      - targets: ["eventforge_users_api:8080"]
    metrics_path: /metrics

  - job_name: eventforge_events_api
    static_configs:
      - targets: ["eventforge_events_api:8080"]
    metrics_path: /metrics

  - job_name: eventforge_booking_api
    static_configs:
      - targets: ["eventforge_booking_api:8080"]
    metrics_path: /metrics